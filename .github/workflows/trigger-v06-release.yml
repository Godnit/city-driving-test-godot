name: Trigger v0.6 Release Build

on:
  issues:
    types: [opened]

permissions:
  actions: write
  issues: write
  contents: read

jobs:
  dispatch:
    if: ${{ github.event.issue.title == 'run-v0.6-release' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Dispatch verified main-branch build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/actions/workflows/build-android.yml/dispatches" \
            -d '{"ref":"main"}'

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.url }}
        run: |
          curl --fail-with-body -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$ISSUE_URL" \
            -d '{"state":"closed"}'
