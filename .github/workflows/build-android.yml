name: Build Android APK v0.6

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  android-debug:
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    env:
      GODOT_VERSION: 4.6.3
      ANDROID_SDK_ROOT: /tmp/android-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify v0.6 source
        shell: bash
        run: |
          set -euo pipefail
          test -f project.godot
          test -f main.tscn
          test -f scripts/main.gd
          test -f scripts/car.gd
          test -f scripts/camera_rig.gd
          test -f scripts/traffic_car.gd
          test -f scripts/driving_controls.gd
          test -f export_presets.cfg
          grep -q 'emulate_mouse_from_touch=false' project.godot
          grep -q 'common/physics_interpolation=true' project.godot
          grep -q 'absf(speed) > 0.38' scripts/car.gd
          grep -q 'InputEventScreenTouch' scripts/driving_controls.gd
          grep -q 'assets/audio/engine_idle.wav' scripts/car.gd

      - name: Download realistic MIT sedan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/models
          url='https://media.githubusercontent.com/media/monstercameron/vkPathTracer/c3f130bff9334b8e927ba7c97360d70b0c5862ad/assets/models/complete_sedan/complete_sedan.glb'
          wget -q -O assets/models/player_sedan.glb "$url"
          test -s assets/models/player_sedan.glb
          size=$(stat -c%s assets/models/player_sedan.glb)
          echo "Sedan size: $size bytes"
          test "$size" -gt 1000000
          test "$size" -lt $((30 * 1024 * 1024))
          cp assets/models/player_sedan.glb assets/models/traffic_hatchback.glb
          du -h assets/models/*.glb

      - name: Download licensed vehicle sounds
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/audio /tmp/carsfx
          wget -q -O assets/audio/engine_idle.wav https://raw.githubusercontent.com/domasx2/banditracer-client/01db9b76381ab70c7d5f38c3678a04a2a4c23579/sounds/engine/loop_0.wav
          wget -q -O assets/audio/engine_high.wav https://raw.githubusercontent.com/domasx2/banditracer-client/01db9b76381ab70c7d5f38c3678a04a2a4c23579/sounds/engine/loop_4.wav
          wget -q -O assets/audio/horn.wav https://opengameart.org/sites/default/files/car2.wav
          wget -q -O /tmp/carsfx.zip https://opengameart.org/sites/default/files/car_sound_effects_pack.zip
          unzip -q /tmp/carsfx.zip -d /tmp/carsfx
          brake=$(find /tmp/carsfx -type f -iname 'brake_press*.ogg' | head -n 1)
          test -n "$brake"
          cp "$brake" assets/audio/brake.ogg
          for file in assets/audio/engine_idle.wav assets/audio/engine_high.wav assets/audio/horn.wav assets/audio/brake.ogg; do
            test -s "$file"
          done
          du -h assets/audio/*

      - name: Add licenses and attribution
        shell: bash
        run: |
          cat > ATTRIBUTIONS.md <<'EOF'
          # Third-party assets

          - Complete Sedan — source repository ChenZongHeng/car — MIT License
            https://github.com/monstercameron/vkPathTracer/tree/c3f130bff9334b8e927ba7c97360d70b0c5862ad/assets/models/complete_sedan
          - Engine loop samples — domasx2/banditracer-client — MIT License
            https://github.com/domasx2/banditracer-client
          - Car Horn — Bart Kelsey — CC0
            https://opengameart.org/content/car-horn
          - Car Sound Effects Pack — Kenney — CC0 (audio only)
            https://opengameart.org/content/car-sound-effects
          EOF

      - name: Install official Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$ANDROID_SDK_ROOT" /tmp/android-tools /tmp/android-tools.zip
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest" /tmp/android-tools
          wget -q -O /tmp/android-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip
          unzip -q /tmp/android-tools.zip -d /tmp/android-tools
          cp -a /tmp/android-tools/cmdline-tools/. "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          sdkmanager="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null || true
          "$sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "build-tools;35.0.1" "platforms;android-35"

      - name: Configure Godot Android environment
        shell: bash
        run: |
          set -euo pipefail
          template_source=$(find /root/.local/share/godot -type f -name android_debug.apk -printf '%h\n' | head -n 1)
          template_target="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$template_target"
          cp -a "$template_source"/. "$template_target"/
          java_home=${JAVA_HOME:-$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")}
          mkdir -p "$HOME/.config/godot"
          root_settings=$(find /root/.config/godot -maxdepth 1 -type f -name 'editor_settings*.tres' | head -n 1 || true)
          if [ -n "$root_settings" ]; then
            cp "$root_settings" "$HOME/.config/godot/editor_settings-4.6.tres"
          else
            printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > "$HOME/.config/godot/editor_settings-4.6.tres"
          fi
          {
            printf '\nexport/android/java_sdk_path = "%s"\n' "$java_home"
            printf 'export/android/android_sdk_path = "%s"\n' "$ANDROID_SDK_ROOT"
            printf 'export/android/debug_keystore = "/root/debug.keystore"\n'
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } >> "$HOME/.config/godot/editor_settings-4.6.tres"
          test -f "$template_target/android_debug.apk"
          test -x "$ANDROID_SDK_ROOT/build-tools/35.0.1/apksigner"

      - name: Import and validate project
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --editor --quit --path . 2>&1 | tee import.log
          ! grep -E 'SCRIPT ERROR|Parse Error|Invalid call' import.log

      - name: Smoke test game startup
        shell: bash
        run: |
          set -euo pipefail
          timeout 60s godot --headless --path . -- --smoke-test 2>&1 | tee smoke-test.log
          ! grep -E 'SCRIPT ERROR|Parse Error|Invalid call' smoke-test.log
          grep -q 'CITY_DRIVING_V06_READY' smoke-test.log

      - name: Export installable APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/android
          apk=build/android/CityDriveMissions-v0.6-Android8.1.apk
          godot --headless --verbose --path . --export-debug Android "$apk" 2>&1 | tee build/android/export.log
          test -f "$apk"
          ! grep -E 'SCRIPT ERROR|Parse Error|Invalid call' build/android/export.log

      - name: Verify APK compatibility and size
        shell: bash
        run: |
          set -euo pipefail
          apk=build/android/CityDriveMissions-v0.6-Android8.1.apk
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/apksigner" verify --verbose "$apk"
          unzip -tq "$apk"
          size=$(stat -c%s "$apk")
          echo "APK size: $size bytes"
          test "$size" -le $((100 * 1024 * 1024))
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/aapt" dump badging "$apk" | tee build/android/badging.txt
          grep -q "native-code: 'armeabi-v7a'" build/android/badging.txt
          grep -q "sdkVersion:'24'" build/android/badging.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CityDriveMissions-v0.6-Android8.1-APK
          path: build/android/CityDriveMissions-v0.6-Android8.1.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CityDriveMissions-v0.6-Diagnostics
          path: |
            import.log
            smoke-test.log
            build/android/export.log
            build/android/badging.txt
          if-no-files-found: ignore
          retention-days: 3
