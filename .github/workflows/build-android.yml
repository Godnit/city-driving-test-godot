name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  android-debug:
    if: github.event_name != 'issues' || github.event.issue.title == 'BUILD_APK'
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    env:
      GODOT_VERSION: 4.6.3
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /root/debug.keystore
      GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
      GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Godot project files
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode source/city-driving-source.zip.b64 > /tmp/city-driving-source.zip
          rm -rf /tmp/city-driving-source
          mkdir -p /tmp/city-driving-source
          unzip -q /tmp/city-driving-source.zip -d /tmp/city-driving-source
          cp -a /tmp/city-driving-source/city-driving-test-godot/. .
          test -f project.godot
          test -f main.tscn
          test -f scripts/main.gd
          test -f scripts/car.gd
          test -f export_presets.cfg
          sed -i '/^gradle_build\/min_sdk=/d; /^gradle_build\/target_sdk=/d' export_presets.cfg

      - name: Configure Godot Android environment
        shell: bash
        run: |
          set -euo pipefail

          template_source="$(find /root/.local/share/godot -type f -name android_debug.apk -printf '%h\n' | head -n 1)"
          test -n "$template_source"
          template_target="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$template_target"
          cp -a "$template_source"/. "$template_target"/
          test -f "$template_target/android_debug.apk"
          test -f "$template_target/android_release.apk"

          java_home="${JAVA_HOME:-}"
          if [ -z "$java_home" ]; then
            java_home="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
          fi
          android_sdk="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$android_sdk" ]; then
            android_sdk="$(dirname "$(dirname "$(readlink -f "$(command -v adb)")")")"
          fi
          test -x "$java_home/bin/java"
          test -x "$android_sdk/platform-tools/adb"

          mkdir -p "$HOME/.config/godot"
          root_settings="$(find /root/.config/godot -maxdepth 1 -type f -name 'editor_settings*.tres' | head -n 1 || true)"
          if [ -n "$root_settings" ]; then
            cp "$root_settings" "$HOME/.config/godot/editor_settings-4.6.tres"
          else
            printf '[gd_resource format=3]\n\n[resource]\n' > "$HOME/.config/godot/editor_settings-4.6.tres"
          fi
          {
            printf '\nexport/android/java_sdk_path = "%s"\n' "$java_home"
            printf 'export/android/android_sdk_path = "%s"\n' "$android_sdk"
            printf 'export/android/debug_keystore = "/root/debug.keystore"\n'
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } >> "$HOME/.config/godot/editor_settings-4.6.tres"

          echo "Java SDK: $java_home"
          echo "Android SDK: $android_sdk"
          echo "Templates: $template_target"

      - name: Verify build environment
        shell: bash
        run: |
          set -euo pipefail
          godot --version
          java -version
          test -f "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_debug.apk"

      - name: Import project and validate scripts
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --editor --quit --path .

      - name: Export installable debug APK
        id: export_apk
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/android
          godot --headless --verbose --path . --export-debug "Android" build/android/CityDrivingTest-debug.apk 2>&1 | tee build/android/export.log

      - name: Upload export diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CityDrivingTest-BuildDiagnostics
          path: build/android/export.log
          if-no-files-found: error
          retention-days: 3

      - name: Check APK size
        if: steps.export_apk.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          test -f build/android/CityDrivingTest-debug.apk
          ls -lh build/android/CityDrivingTest-debug.apk
          size=$(stat -c%s build/android/CityDrivingTest-debug.apk)
          limit=$((100 * 1024 * 1024))
          echo "APK size: $size bytes"
          if [ "$size" -gt "$limit" ]; then
            echo "APK exceeds the 100 MiB limit"
            exit 1
          fi

      - name: Upload APK
        if: steps.export_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: CityDrivingTest-APK
          path: build/android/CityDrivingTest-debug.apk
          if-no-files-found: error
          compression-level: 0

      - name: Fail after diagnostics are saved
        if: steps.export_apk.outcome != 'success'
        shell: bash
        run: exit 1
