name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  android-debug:
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    env:
      GODOT_VERSION: 4.6.3
      ANDROID_SDK_ROOT: /tmp/android-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify ultra-lite source
        shell: bash
        run: |
          set -euo pipefail
          test -f project.godot
          test -f main.tscn
          test -f scripts/main.gd
          test -f scripts/car.gd
          test -f export_presets.cfg
          grep -q 'size/viewport_width=640' project.godot
          grep -q 'size/viewport_height=360' project.godot
          grep -q 'stretch/mode="viewport"' project.godot
          grep -q 'handheld/orientation=0' project.godot
          grep -q 'common/physics_ticks_per_second=30' project.godot
          grep -q 'gl_compatibility' project.godot
          grep -q 'architectures/armeabi-v7a=true' export_presets.cfg
          ! grep -q 'ToyCar' scripts/car.gd

      - name: Add CC0 low-poly city and car models
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/models /tmp/kenney-car /tmp/kenney-car.zip
          mkdir -p assets/models/Textures /tmp/kenney-car

          city_base=https://raw.githubusercontent.com/KenneyNL/Starter-Kit-City-Builder/main/models
          wget -q -O assets/models/building_01.glb "$city_base/building-small-a.glb"
          wget -q -O assets/models/building_02.glb "$city_base/building-small-b.glb"
          wget -q -O assets/models/building_03.glb "$city_base/building-small-c.glb"
          wget -q -O assets/models/building_04.glb "$city_base/building-small-d.glb"
          wget -q -O assets/models/Textures/colormap.png "$city_base/Textures/colormap.png"

          wget -q -O /tmp/kenney-car.zip https://opengameart.org/sites/default/files/kenney_car-kit_3.1.zip
          unzip -q /tmp/kenney-car.zip -d /tmp/kenney-car
          car_file=$(find /tmp/kenney-car -type f -iname 'sedan.glb' | head -n 1 || true)
          test -n "$car_file" || car_file=$(find /tmp/kenney-car -type f -iname 'suv.glb' | head -n 1 || true)
          test -n "$car_file" || car_file=$(find /tmp/kenney-car -type f -iname 'hatchback.glb' | head -n 1 || true)
          test -n "$car_file" || car_file=$(find /tmp/kenney-car -type f -iname '*.glb' | head -n 1 || true)
          test -n "$car_file"
          cp "$car_file" assets/models/player_car.glb

          for file in assets/models/*.glb assets/models/Textures/colormap.png; do test -s "$file"; done
          car_size=$(stat -c%s assets/models/player_car.glb)
          echo "Selected low-poly car: $car_file"
          echo "Low-poly car size: $car_size bytes"
          test "$car_size" -le $((3 * 1024 * 1024))
          du -h assets/models/*.glb assets/models/Textures/colormap.png

      - name: Install official Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$ANDROID_SDK_ROOT" /tmp/android-tools /tmp/android-tools.zip
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest" /tmp/android-tools
          wget -q -O /tmp/android-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip
          unzip -q /tmp/android-tools.zip -d /tmp/android-tools
          cp -a /tmp/android-tools/cmdline-tools/. "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          sdkmanager="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null || true
          "$sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "build-tools;35.0.1" "platforms;android-35"

      - name: Configure Godot Android environment
        shell: bash
        run: |
          set -euo pipefail
          template_source=$(find /root/.local/share/godot -type f -name android_debug.apk -printf '%h\n' | head -n 1)
          template_target="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$template_target"
          cp -a "$template_source"/. "$template_target"/
          java_home=${JAVA_HOME:-$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")}
          mkdir -p "$HOME/.config/godot"
          root_settings=$(find /root/.config/godot -maxdepth 1 -type f -name 'editor_settings*.tres' | head -n 1 || true)
          if [ -n "$root_settings" ]; then
            cp "$root_settings" "$HOME/.config/godot/editor_settings-4.6.tres"
          else
            printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > "$HOME/.config/godot/editor_settings-4.6.tres"
          fi
          {
            printf '\nexport/android/java_sdk_path = "%s"\n' "$java_home"
            printf 'export/android/android_sdk_path = "%s"\n' "$ANDROID_SDK_ROOT"
            printf 'export/android/debug_keystore = "/root/debug.keystore"\n'
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } >> "$HOME/.config/godot/editor_settings-4.6.tres"
          test -f "$template_target/android_debug.apk"
          test -x "$ANDROID_SDK_ROOT/build-tools/35.0.1/apksigner"

      - name: Import and validate project
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --editor --quit --path . 2>&1 | tee import.log
          ! grep -E 'SCRIPT ERROR|Parse Error|Invalid call|ERROR:' import.log

      - name: Smoke test game startup
        shell: bash
        run: |
          set -euo pipefail
          timeout 30s godot --headless --path . -- --smoke-test 2>&1 | tee smoke-test.log
          ! grep -E 'SCRIPT ERROR|Parse Error|Invalid call|ERROR:' smoke-test.log
          grep -q 'CITY_DRIVING_READY' smoke-test.log

      - name: Export installable APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/android
          apk=build/android/CityDrivingTest-v0.3-UltraLite.apk
          godot --headless --verbose --path . --export-debug Android "$apk" 2>&1 | tee build/android/export.log
          test -f "$apk"
          ! grep -E 'SCRIPT ERROR|Parse Error|Invalid call' build/android/export.log

      - name: Verify APK compatibility and size
        shell: bash
        run: |
          set -euo pipefail
          apk=build/android/CityDrivingTest-v0.3-UltraLite.apk
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/apksigner" verify --verbose "$apk"
          unzip -tq "$apk"
          size=$(stat -c%s "$apk")
          echo "APK size: $size bytes"
          test "$size" -le $((50 * 1024 * 1024))
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/aapt" dump badging "$apk" | tee build/android/badging.txt
          grep -q "native-code: 'armeabi-v7a'" build/android/badging.txt
          grep -q "sdkVersion:'24'" build/android/badging.txt
          grep -q "screenOrientation='landscape'" build/android/badging.txt || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CityDrivingTest-v0.3-UltraLite-APK
          path: build/android/CityDrivingTest-v0.3-UltraLite.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CityDrivingTest-v0.3-UltraLite-Diagnostics
          path: |
            import.log
            smoke-test.log
            build/android/export.log
            build/android/badging.txt
          if-no-files-found: ignore
          retention-days: 3
