name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  android-debug:
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.3
    env:
      GODOT_VERSION: 4.6.3
      ANDROID_SDK_ROOT: /tmp/android-sdk
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /root/debug.keystore
      GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
      GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Godot project files
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode source/city-driving-source.zip.b64 > /tmp/city-driving-source.zip
          rm -rf /tmp/city-driving-source
          mkdir -p /tmp/city-driving-source
          unzip -q /tmp/city-driving-source.zip -d /tmp/city-driving-source
          cp -a /tmp/city-driving-source/city-driving-test-godot/. .
          test -f project.godot
          test -f main.tscn
          test -f scripts/main.gd
          test -f scripts/car.gd
          test -f export_presets.cfg
          sed -i '/^gradle_build\/min_sdk=/d; /^gradle_build\/target_sdk=/d' export_presets.cfg
          if ! grep -q '^textures/vram_compression/import_etc2_astc=true' project.godot; then
            sed -i '/^\[rendering\]/a textures/vram_compression/import_etc2_astc=true' project.godot
          fi
          grep -q '^textures/vram_compression/import_etc2_astc=true' project.godot

      - name: Install official Android SDK 35
        id: android_sdk
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/setup
          {
            set -eux
            rm -rf "$ANDROID_SDK_ROOT" /tmp/android-command-tools /tmp/android-command-tools.zip
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest" /tmp/android-command-tools
            tools_url=https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip
            if command -v curl >/dev/null 2>&1; then
              curl -fL --retry 3 --retry-delay 2 -o /tmp/android-command-tools.zip "$tools_url"
            elif command -v wget >/dev/null 2>&1; then
              wget -O /tmp/android-command-tools.zip "$tools_url"
            else
              python3 -c 'import sys, urllib.request; urllib.request.urlretrieve(sys.argv[1], sys.argv[2])' "$tools_url" /tmp/android-command-tools.zip
            fi
            unzip -q /tmp/android-command-tools.zip -d /tmp/android-command-tools
            cp -a /tmp/android-command-tools/cmdline-tools/. "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
            sdkmanager="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            test -x "$sdkmanager"
            java -version
            yes | "$sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null || true
            "$sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" \
              "platform-tools" \
              "build-tools;35.0.1" \
              "platforms;android-35"
            test -x "$ANDROID_SDK_ROOT/platform-tools/adb"
            test -x "$ANDROID_SDK_ROOT/build-tools/35.0.1/apksigner"
            test -d "$ANDROID_SDK_ROOT/platforms/android-35"
          } 2>&1 | tee build/setup/android-sdk-install.log

      - name: Upload Android SDK diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CityDrivingTest-AndroidSDK-Diagnostics
          path: build/setup/android-sdk-install.log
          if-no-files-found: error
          retention-days: 3

      - name: Configure Godot Android environment
        if: steps.android_sdk.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          template_source="$(find /root/.local/share/godot -type f -name android_debug.apk -printf '%h\n' | head -n 1)"
          test -n "$template_source"
          template_target="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$template_target"
          cp -a "$template_source"/. "$template_target"/
          test -f "$template_target/android_debug.apk"
          test -f "$template_target/android_release.apk"
          java_home="${JAVA_HOME:-}"
          if [ -z "$java_home" ]; then
            java_home="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
          fi
          test -x "$java_home/bin/java"
          mkdir -p "$HOME/.config/godot"
          root_settings="$(find /root/.config/godot -maxdepth 1 -type f -name 'editor_settings*.tres' | head -n 1 || true)"
          if [ -n "$root_settings" ]; then
            cp "$root_settings" "$HOME/.config/godot/editor_settings-4.6.tres"
          else
            printf '[gd_resource format=3]\n\n[resource]\n' > "$HOME/.config/godot/editor_settings-4.6.tres"
          fi
          {
            printf '\nexport/android/java_sdk_path = "%s"\n' "$java_home"
            printf 'export/android/android_sdk_path = "%s"\n' "$ANDROID_SDK_ROOT"
            printf 'export/android/debug_keystore = "/root/debug.keystore"\n'
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } >> "$HOME/.config/godot/editor_settings-4.6.tres"

      - name: Verify build environment
        if: steps.android_sdk.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          godot --version
          java -version
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/aapt2" version
          test -f "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_debug.apk"

      - name: Import project and validate scripts
        if: steps.android_sdk.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --editor --quit --path .

      - name: Export installable debug APK
        if: steps.android_sdk.outcome == 'success'
        id: export_apk
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/android
          godot --headless --verbose --path . --export-debug "Android" build/android/CityDrivingTest-debug.apk 2>&1 | tee build/android/export.log

      - name: Upload export diagnostics
        if: always() && steps.android_sdk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: CityDrivingTest-BuildDiagnostics
          path: build/android/export.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify APK and size
        if: steps.export_apk.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          test -f build/android/CityDrivingTest-debug.apk
          "$ANDROID_SDK_ROOT/build-tools/35.0.1/apksigner" verify --verbose build/android/CityDrivingTest-debug.apk
          unzip -tq build/android/CityDrivingTest-debug.apk
          size=$(stat -c%s build/android/CityDrivingTest-debug.apk)
          limit=$((100 * 1024 * 1024))
          echo "APK size: $size bytes"
          test "$size" -le "$limit"

      - name: Upload APK
        if: steps.export_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: CityDrivingTest-APK
          path: build/android/CityDrivingTest-debug.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Fail after diagnostics are saved
        if: steps.android_sdk.outcome != 'success' || steps.export_apk.outcome != 'success'
        shell: bash
        run: exit 1
